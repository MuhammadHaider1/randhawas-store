services:
  - type: web
    name: randahaws-backend
    runtime: python
    repo: https://github.com/MuhammadHaider1/Heels-E-commerce-store
    plan: free
    region: singapore
    branch: main
    buildCommand: cd backend && bash build.sh
    startCommand: cd backend && gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile -
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: USE_POSTGRES
        value: "True"
      - key: DB_NAME
        value: "randahaws"
      - key: DB_USER
        value: "neondb_owner"
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        value: "ep-shiny-scene-aobrsn57-pooler.c-2.ap-southeast-1.aws.neon.tech"
      - key: DB_PORT
        value: "5432"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: EMAIL_HOST_USER
        value: "hirarandhawa660@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: USE_CLOUDINARY
        value: "True"
      - key: CLOUDINARY_CLOUD_NAME
        value: "fphi64g1"
      - key: CLOUDINARY_API_KEY
        value: "414982962672331"
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EASYPAISA_NUMBER
        value: "0325 7163224"
      - key: JAZZCASH_NUMBER
        value: "0325 7163224"
      - key: SITE_URL
        sync: false
